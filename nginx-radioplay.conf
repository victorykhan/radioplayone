server {
    listen 80;
    server_name play.vawam.ca;
    client_max_body_size 50M;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name play.vawam.ca;
    client_max_body_size 50M;

    ssl_certificate /etc/nginx/ssl/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/play.vawam.ca.key;

    # ── Icecast Admin Panel (forwarded from internal 127.0.0.1:8000) ──────────
    # Accessible at: https://play.vawam.ca/icecast-admin/
    location /icecast-admin/ {
        proxy_pass http://127.0.0.1:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }

    # ── Icecast Status & Stats pages ─────────────────────────────────────────
    location /icecast-status/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    # ── Raw audio stream (MP3) for players and apps ───────────────────────────
    # Use this URL in radio apps, TuneIn, VLC, etc.
    location /stream.mp3 {
        proxy_pass http://127.0.0.1:8000/radio;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        add_header Cache-Control 'no-cache, no-store';
        add_header Access-Control-Allow-Origin '*';
    }

    # ── /stream → serves the beautiful public player page ─────────────────────
    # (raw audio at /stream.mp3, HTML player at /stream)
    location = /stream {
        proxy_pass http://localhost:3000/stream.html;
        proxy_set_header Host $host;
        proxy_cache_bypass 1;
    }

    # ── Main app (Express on port 3000) ───────────────────────────────────────
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
